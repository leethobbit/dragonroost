# good
version: '3'

# includes:
#   docker: ./docker/Taskfile.yml

output: prefixed

vars:
  IMAGE: dragonroost
  VERSION: latest

env:
  BAR: baz

tasks:
# Setup tasks
  poetry-download:
    desc: Downloads Poetry and installs it.
    cmds:
      - curl -sSL https://install.python-poetry.org | python3 -

  poetry-remove:
    desc: Uninstalls Poetry.
    cmds:
      - curl -sSL https://install.python-poetry.org | python3 - --uninstall

# Installation tasks
  install:
    desc: Installs dependencies from the pyproject.toml via Poetry.
    cmds:
      - poetry lock -n && poetry export --without-hashes > requirements.txt
      - poetry install -n
      - poetry run mypy --install-types --non-interactive .
  
  pre-commit-install:
    cmds:
      - poetry run pre-commit install

# Linting tasks
  test:
    cmds:
      - poetry run pytest -c pyproject.toml .
      - poetry run coverage-badge -o assets/images/coverage.svg -f

  codestyle:
    cmds:
      - poetry run pyupgrade --exit-zero-even-if-changed --py39-plus **/*.py
      - poetry run isort --settings-path pyproject.toml .
      - poetry run black --config pyproject.toml .

  check-codestyle:
    cmds:
      - poetry run isort --diff --check-only --settings-path pyproject.toml .
      - poetry run black --diff --check --config pyproject.toml .
      - poetry run darglint --verbosity 2 dragonroost tests

  mypy:
    cmds:
      - poetry run mypy --config-file pyproject.toml .
  
  check-safety:
    cmds:
      - poetry check
      - poetry run safety check --full-report
      - poetry run bandit -ll --recursive dragonroost tests
  
  lint:
    cmds:
      - task: test
      - task: check-codestyle
      - task: mypy
      - task: check-safety
  
  update-dev-deps:
    cmds:
      - poetry add -D bandit@latest darglint@latest "isort[colors]@latest" mypy@latest pre-commit@latest pydocstyle@latest pylint@latest pytest@latest pyupgrade@latest safety@latest coverage@latest coverage-badge@latest pytest-html@latest pytest-cov@latest
      - poetry add -D --allow-prereleases black@latest

# Docker tasks
  docker-build:
    desc: Build's Docker image with version as "latest" by default.
    cmds:
      - docker build -t {{.IMAGE}}:{{.VERSION}} . -f Dockerfile --no-cache
  
  docker-remove:
    desc: Removes the "latest" Docker image.
    cmds:
      - docker rmi -f {{.IMAGE}}:{{.VERSION}}
  
  docker-run-prod:
    desc: Builds and runs the prod containers for Dragonroost.
    cmds:
      - docker-compose up --build -d
  
  docker-run-dev:
    desc: Runs the dev Postgres container and then does runserver.
    cmds:
      - docker-compose -f docker-compose-dev.yml up -d
      - python src/manage.py runserver