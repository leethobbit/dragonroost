{% extends "base.html" %}
{% block content %}
<a href="{% url 'business:location-create' %}" class="btn btn-primary btn-sm">Add New Location</a>
<h1>Location List</h1>
<ul>
{% for location in locations %}
<li>
<a href="{% url 'business:location-detail' location.id %}">{{ location.name }}
</a>
</li>
{% empty %}
<li>No locations available.</li>
{% endfor %}
</ul>
{% endblock %}
