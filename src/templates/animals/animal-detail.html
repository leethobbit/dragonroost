{% extends "base.html" %}
{% block content %}
<h1>{{ animal.name }} - Detail</h1>
<p>{{ animal.description }}</p>
{% if animal.animal_photo %}
<div>
<img src="{{ animal.animal_photo.url }}">
</div>
{% endif %}
<a href="{% url 'animals:animal-update' animal.id %}">Edit</a>
<a href="{% url 'animals:animal-delete' animal.id %}">Delete</a>
{% endblock %}
