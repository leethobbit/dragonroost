{% extends "base.html" %}

{% load django_bootstrap5 %}

<form class="align-items-center flex-column" method="post">
    <h3 class="text-secondary">New Medical Record</h3>
    {% csrf_token %}
  
    {% bootstrap_form medical_record_form %}
  
    {% bootstrap_button button_type="submit" content="OK" %}
    {% bootstrap_button button_type="reset" content="Cancel" %}
</form>
